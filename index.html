<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Issues Tracker</title>

<link rel="stylesheet" href="styles/styles.css">

</head>

<body>

<div id="spinner" class="spinner-container hidden">
<div class="loader"></div>
</div>

<section id="login-page" class="login-container">

<div class="login-box">

<div class="login-header">

<img src="assets/github-logo.png" class="login-logo">

<h2>GitHub Issues Tracker</h2>
<p>Sign in to manage your issues</p>

</div>

<form id="login-form">

<div class="input-group">
<label>Username</label>
<input type="text" id="username" placeholder="Enter Username" required>
<small>Default: admin</small>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" placeholder="Enter Password" required>
<small>Default: admin123</small>
</div>

<button type="submit" class="btn-primary">Sign In</button>

</form>

</div>
</section>

<section id="main-page" class="hidden">

<nav class="navbar">

<div class="nav-left">

<img src="assets/github-logo.png" class="logo-icon">

<h2>GitHub Issues Tracker</h2>

</div>

<div class="nav-right">

<div class="search-box">
<input type="text" id="search-input" placeholder="Search issues...">
</div>

<button class="btn-primary new-issue-btn">
New Issue
</button>

</div>

</nav>

<main class="dashboard-content">

<div class="tabs-container">

<button class="tab-btn active" data-filter="all">All</button>
<button class="tab-btn" data-filter="open">Open</button>
<button class="tab-btn" data-filter="closed">Closed</button>

</div>


<div class="issues-header">

<div class="header-left">

<div class="icon-circle">
    <img src="assets/Aperture.png" alt="Aperture" style="width: 24px;">
</div>

<div>

<h3 id="issue-count-text">0 Issues</h3>
<p>Track and manage your project issues</p>

</div>

</div>

</div>

<div id="issues-grid" class="issues-grid"></div>

</main>
</section>

<div id="issue-modal" class="modal hidden">

<div class="modal-content">

<span class="close-btn">&times;</span>

<div id="modal-body"></div>

</div>
</div>

<script src="script/script.js"></script>

</body>
</html>
