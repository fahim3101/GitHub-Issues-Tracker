<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Issues Tracker</title>

<link rel="stylesheet" href="styles/styles.css">

</head>

<body>

<div id="spinner" class="spinner-container hidden">
<div class="loader"></div>
</div>

<section id="login-page" class="login-container">

<div class="login-box">

<div class="login-header">

<img src="assets/github-logo.png" class="login-logo">

<h2>GitHub Issues Tracker</h2>
<p>Sign in to manage your issues</p>

</div>

<form id="login-form">

<div class="input-group">
<label>Username</label>
<input type="text" id="username" placeholder="Enter Username" required>
<small>Default: admin</small>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" placeholder="Enter Password" required>
<small>Default: admin123</small>
</div>

<button type="submit" class="btn-primary">Sign In</button>

</form>

</div>
</section>
